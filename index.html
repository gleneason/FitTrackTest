<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b1220" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <title>Glen Track</title>

  <!-- iOS Home Screen title -->
  <meta name="apple-mobile-web-app-title" content="Glen Track" />

  <link rel="stylesheet" href="styles.css" />

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>

<body>
  <header class="topbar">
    <div class="brand">
      <div class="brandIcon">G</div>
      <div class="brandText">
        <div class="brandName">Glen Track</div>
        <div class="brandSub" id="subTitle">Dashboard</div>
      </div>
    </div>
    <div class="statusPill" id="statusPill">Ready</div>
  </header>

  <main class="app">
    <!-- DASHBOARD -->
    <section class="screen active" id="screen-dashboard" aria-label="Dashboard">
      <div class="card">
        <div class="cardTitle">Today</div>
        <div class="grid2">
          <div class="miniStat">
            <div class="miniLabel">Latest Weight</div>
            <div class="miniValue" id="dashLatestWeight">—</div>
            <div class="miniHint" id="dashLatestWeightHint">No entries yet</div>
          </div>
          <div class="miniStat">
            <div class="miniLabel">Macros (Today)</div>
            <div class="miniValue" id="dashMacros">—</div>
            <div class="miniHint" id="dashMacrosHint">Calories / P / C / F</div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="cardTitle">Trends</div>
        <div class="chartWrap">
          <canvas id="weightChart" height="170"></canvas>
        </div>
      </div>

      <div class="card">
        <div class="cardTitle">This Week</div>
        <div class="grid2">
          <div class="miniStat">
            <div class="miniLabel">Workouts</div>
            <div class="miniValue" id="dashWorkoutsWeek">—</div>
            <div class="miniHint">Last 7 days</div>
          </div>
          <div class="miniStat">
            <div class="miniLabel">Weight Avg</div>
            <div class="miniValue" id="dashWeightAvg7">—</div>
            <div class="miniHint">7-day average</div>
          </div>
        </div>
      </div>
    </section>

    <!-- WEIGHT -->
    <section class="screen" id="screen-weight" aria-label="Weight">
      <div class="card">
        <div class="cardTitle">Weight Log</div>

        <label class="label">Date</label>
        <input class="input" id="weightDate" type="date" />

        <label class="label">Weight (lbs)</label>
        <div class="row">
          <input class="input" id="weightValue" type="number" inputmode="decimal" step="0.1" placeholder="e.g., 195.0" />
          <button class="btn primary" id="btnAddWeight">Add</button>
        </div>

        <div class="row">
          <button class="btn ghost" id="btnClearWeights">Clear All</button>
          <button class="btn ghost" id="btnExportWeights">Export</button>
        </div>
      </div>

      <div class="card">
        <div class="cardTitle">History</div>
        <div id="weightsList" class="list"></div>
      </div>
    </section>

    <!-- MACROS -->
    <section class="screen" id="screen-macros" aria-label="Macros">
      <div class="card">
        <div class="cardTitle">Macros</div>

        <label class="label">Date</label>
        <input class="input" id="macroDate" type="date" />

        <div class="grid2">
          <div>
            <label class="label">Calories</label>
            <input class="input" id="calories" type="number" inputmode="numeric" step="1" placeholder="e.g., 2200" />
          </div>
          <div>
            <label class="label">Protein (g)</label>
            <input class="input" id="protein" type="number" inputmode="numeric" step="1" placeholder="e.g., 180" />
          </div>
          <div>
            <label class="label">Carbs (g)</label>
            <input class="input" id="carbs" type="number" inputmode="numeric" step="1" placeholder="e.g., 200" />
          </div>
          <div>
            <label class="label">Fat (g)</label>
            <input class="input" id="fat" type="number" inputmode="numeric" step="1" placeholder="e.g., 70" />
          </div>
        </div>

        <div class="row">
          <button class="btn primary" id="btnSaveMacros">Save</button>
          <button class="btn ghost" id="btnClearMacros">Clear</button>
        </div>
      </div>

      <div class="card">
        <div class="cardTitle">Saved (Selected Date)</div>
        <pre class="codeBox" id="macrosPreview">{}</pre>
      </div>
    </section>

    <!-- WORKOUTS -->
    <section class="screen" id="screen-workouts" aria-label="Workouts">
      <div class="card">
        <div class="cardTitle">Workouts</div>

        <label class="label">Date</label>
        <input class="input" id="workoutDate" type="date" />

        <label class="label">Template</label>
        <div class="row">
          <button class="btn chip" data-template="push">Push</button>
          <button class="btn chip" data-template="pull">Pull</button>
          <button class="btn chip" data-template="legs">Legs</button>
        </div>

        <label class="label">Workout (edit as needed)</label>
        <textarea class="input textarea" id="workoutText" rows="10" placeholder="Template will auto-fill here."></textarea>

        <div class="row">
          <button class="btn primary" id="btnSaveWorkout">Save</button>
          <button class="btn ghost" id="btnClearWorkout">Clear</button>
        </div>
      </div>

      <div class="card">
        <div class="cardTitle">History</div>
        <div id="workoutsList" class="list"></div>
      </div>
    </section>
  </main>

  <!-- Bottom Tab Bar -->
  <nav class="tabbar" aria-label="Bottom Navigation">
    <button class="tab active" data-go="dashboard">
      <span class="tabIcon">▦</span>
      <span class="tabLabel">Dashboard</span>
    </button>
    <button class="tab" data-go="weight">
      <span class="tabIcon">⚖︎</span>
      <span class="tabLabel">Weight</span>
    </button>
    <button class="tab" data-go="macros">
      <span class="tabIcon">⛽︎</span>
      <span class="tabLabel">Macros</span>
    </button>
    <button class="tab" data-go="workouts">
      <span class="tabIcon">🏋︎</span>
      <span class="tabLabel">Workouts</span>
    </button>
  </nav>

  <script src="app.js"></script>
</body>
</html>
