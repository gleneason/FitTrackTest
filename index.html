<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>FitTrack</title>

  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#0b1220" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <header class="topbar">
    <div class="brand">⚡ FitTrack</div>
    <div id="statusPill" class="pill">Ready</div>
  </header>

  <nav class="tabs">
    <button class="tab active" data-tab="weight">Weight</button>
    <button class="tab" data-tab="macros">Macros</button>
    <button class="tab" data-tab="workouts">Workouts</button>
    <button class="tab" data-tab="dashboard">Dashboard</button>
  </nav>

  <main class="container">
    <!-- WEIGHT -->
    <section id="tab-weight" class="panel active">
      <h1>Weight Log</h1>

      <label>Date</label>
      <input id="weightDate" type="date" />

      <label>Weight (lbs)</label>
      <div class="row">
        <input id="weightValue" type="number" step="0.1" placeholder="e.g., 195.0" />
        <button id="addWeight">Add</button>
      </div>

      <button id="clearWeights" class="danger">Clear All</button>

      <h2>History</h2>
      <div id="weightList" class="list"></div>

      <h2>Chart</h2>
      <canvas id="weightChart" height="160"></canvas>
    </section>

    <!-- MACROS -->
    <section id="tab-macros" class="panel">
      <h1>Macros</h1>

      <label>Date</label>
      <input id="macroDate" type="date" />

      <div class="grid2">
        <div>
          <label>Calories</label>
          <input id="calories" type="number" placeholder="e.g., 2400" />
        </div>
        <div>
          <label>Protein (g)</label>
          <input id="protein" type="number" placeholder="e.g., 180" />
        </div>
        <div>
          <label>Carbs (g)</label>
          <input id="carbs" type="number" placeholder="e.g., 250" />
        </div>
        <div>
          <label>Fat (g)</label>
          <input id="fat" type="number" placeholder="e.g., 70" />
        </div>
      </div>

      <button id="saveMacros">Save Macros</button>

      <h2>History</h2>
      <div id="macroList" class="list"></div>

      <h2>Chart</h2>
      <canvas id="macroChart" height="160"></canvas>
    </section>

    <!-- WORKOUTS -->
    <section id="tab-workouts" class="panel">
      <h1>Workouts</h1>

      <label>Date</label>
      <input id="workoutDate" type="date" />

      <label>Exercise</label>
      <input id="exerciseName" type="text" placeholder="e.g., Bench Press" />

      <div class="grid3">
        <div>
          <label>Sets</label>
          <input id="sets" type="number" placeholder="4" />
        </div>
        <div>
          <label>Reps</label>
          <input id="reps" type="number" placeholder="8" />
        </div>
        <div>
          <label>Weight</label>
          <input id="liftWeight" type="number" step="0.5" placeholder="185" />
        </div>
      </div>

      <button id="addExercise">Add Exercise</button>

      <h2>Workout Log</h2>
      <div id="workoutList" class="list"></div>
    </section>

    <!-- DASHBOARD -->
    <section id="tab-dashboard" class="panel">
      <h1>Dashboard</h1>

      <div class="cards">
        <div class="card">
          <div class="cardTitle">Avg Weight (7d)</div>
          <div id="avgWeight" class="big">--</div>
        </div>
        <div class="card">
          <div class="cardTitle">Avg Calories (7d)</div>
          <div id="avgCalories" class="big">--</div>
        </div>
        <div class="card">
          <div class="cardTitle">Workouts (7d)</div>
          <div id="wkCount" class="big">--</div>
        </div>
      </div>
    </section>
  </main>

  <!-- Charts -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="app.js"></script>
</body>
</html>
